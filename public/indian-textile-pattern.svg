      <circle cx="0" cy="0" r="48" fill="none" stroke="#f2b7c9" stroke-width="5" opacity=".72"/>
      <circle cx="0" cy="0" r="38" fill="none" stroke="#6f0029" stroke-width="4" opacity=".82"/>
      <circle cx="0" cy="0" r="29" fill="none" stroke="#d44772" stroke-width="3" opacity=".78"/>
      <circle cx="0" cy="0" r="18" fill="none" stroke="#f2b7c9" stroke-width="3.5" opacity=".78"/>

      <g fill="#f2b7c9" opacity=".78">
        <circle cx="0" cy="-43" r="2.2"/>
        <circle cx="15" cy="-40" r="2.2"/>
        <circle cx="29" cy="-31" r="2.2"/>
        <circle cx="40" cy="-16" r="2.2"/>
        <circle cx="43" cy="0" r="2.2"/>
        <circle cx="40" cy="16" r="2.2"/>
        <circle cx="29" cy="31" r="2.2"/>
        <circle cx="15" cy="40" r="2.2"/>
        <circle cx="0" cy="43" r="2.2"/>
        <circle cx="-15" cy="40" r="2.2"/>
        <circle cx="-29" cy="31" r="2.2"/>
        <circle cx="-40" cy="16" r="2.2"/>
        <circle cx="-43" cy="0" r="2.2"/>
        <circle cx="-40" cy="-16" r="2.2"/>
        <circle cx="-29" cy="-31" r="2.2"/>
        <circle cx="-15" cy="-40" r="2.2"/>
      </g>

      <g fill="#6f0029" opacity=".88">
        <ellipse cx="0" cy="-27" rx="4.5" ry="10"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="10" transform="rotate(30)"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="10" transform="rotate(60)"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="10" transform="rotate(90)"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="10" transform="rotate(120)"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="10" transform="rotate(150)"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="10" transform="rotate(180)"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="10" transform="rotate(210)"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="10" transform="rotate(240)"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="10" transform="rotate(270)"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="10" transform="rotate(300)"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="10" transform="rotate(330)"/>
      </g>

