        <ellipse cx="0" cy="-12" rx="3" ry="7"/>
        <ellipse cx="0" cy="-12" rx="3" ry="7" transform="rotate(45)"/>
        <ellipse cx="0" cy="-12" rx="3" ry="7" transform="rotate(90)"/>
        <ellipse cx="0" cy="-12" rx="3" ry="7" transform="rotate(135)"/>
        <ellipse cx="0" cy="-12" rx="3" ry="7" transform="rotate(180)"/>
        <ellipse cx="0" cy="-12" rx="3" ry="7" transform="rotate(225)"/>
