      <use href="#mandala" x="55" y="55"/>
      <use href="#mandala" x="0" y="0"/>
      <use href="#mandala" x="110" y="0"/>
      <use href="#mandala" x="0" y="110"/>
      <use href="#mandala" x="110" y="110"/>
      <use href="#diamond" x="55" y="0" transform="scale(.58)"/>
      <use href="#diamond" x="55" y="110" transform="scale(.58)"/>
      <use href="#diamond" x="0" y="55" transform="scale(.58)"/>
      <use href="#diamond" x="110" y="55" transform="scale(.58)"/>
    </pattern>
