    <g id="diamond">
      <path d="M0-35 35 0 0 35-35 0Z" fill="#7d002e" opacity=".78"/>
      <path d="M0-27 27 0 0 27-27 0Z" fill="none" stroke="#f2b7c9" stroke-width="4" opacity=".76"/>
      <path d="M0-15 15 0 0 15-15 0Z" fill="#d44772" opacity=".82"/>
      <path d="M-22 0c7-7 15-7 22 0 7-7 15-7 22 0" fill="none" stroke="#f2b7c9" stroke-width="2.5" stroke-linecap="round" opacity=".62"/>
      <circle cx="0" cy="0" r="4" fill="#f2b7c9" opacity=".84"/>
    </g>

    <pattern id="tile" width="110" height="110" patternUnits="userSpaceOnUse">
      <rect width="110" height="110" fill="#a50034"/>
      <g fill="none" stroke="#f2b7c9" stroke-width="2.4" opacity=".42">
        <path d="M0 55C19 22 36 22 55 55s36 33 55 0"/>
        <path d="M55 0c33 19 33 36 0 55s-33 36 0 55"/>
